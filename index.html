<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Apexnity | Trail Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00f2ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        .brand { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .card h3 { margin: 0; color: #8b949e; font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: bold; margin-top: 10px; }
        .chart-box { background: var(--card); padding: 25px; border-radius: 12px; margin-top: 30px; height: 400px; border: 1px solid #30363d; }
        .btn-sync { background: #fc4c02; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">APEXNITY</div>
        <a href="https://www.strava.com/oauth/authorize?client_id=GANTI_ID&response_type=code&redirect_uri=https://apexsync.vercel.app/api&scope=activity:read_all" class="btn-sync">SYNC DATA</a>
    </div>

    <div class="grid">
        <div class="card"><h3>Fitness (CTL)</h3><div class="value" id="ctl-val">0</div></div>
        <div class="card"><h3>Fatigue (ATL)</h3><div class="value" id="atl-val" style="color: #ff4500;">0</div></div>
        <div class="card"><h3>Form (TSB)</h3><div class="value" id="tsb-val" style="color: #00ff88;">0</div></div>
    </div>

    <div class="chart-box">
        <canvas id="pmcChart"></canvas>
    </div>

    <script>
        async function fetchData() {
            const res = await fetch('/api/metrics');
            const data = await res.json();
            if(data.length > 0) {
                const latest = data[0];
                document.getElementById('ctl-val').innerText = Math.round(latest.ctl);
                document.getElementById('atl-val').innerText = Math.round(latest.atl);
                document.getElementById('tsb-val').innerText = Math.round(latest.tsb);
                renderPMC(data.reverse());
            }
        }

        function renderPMC(data) {
            new Chart(document.getElementById('pmcChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => new Date(d.record_date).toLocaleDateString()),
                    datasets: [
                        { label: 'Fitness (CTL)', data: data.map(d => d.ctl), borderColor: '#00f2ff', tension: 0.3, fill: false },
                        { label: 'Fatigue (ATL)', data: data.map(d => d.atl), borderColor: '#ff4500', tension: 0.3, fill: false, borderDash: [5, 5] },
                        { label: 'Form (TSB)', data: data.map(d => d.tsb), backgroundColor: 'rgba(0, 255, 136, 0.2)', fill: true, type: 'bar' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#30363d' } }, x: { grid: { display: false } } } }
            });
        }
        fetchData();
    </script>
</body>
</html>
