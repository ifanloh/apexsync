<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Apexnity | Commander</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00f2ff; --border: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card { text-align: center; padding: 10px; background: #0d1117; border-radius: 8px; }
        .stat-card div { font-size: 24px; font-weight: bold; color: white; }
        input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--border); color: white; margin-top: 10px; border-radius: 6px; box-sizing: border-box;}
        .btn-strava { display: block; text-align: center; background: #fc4c02; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        .btn-save { width:100%; margin-top:15px; padding:10px; cursor:pointer; background:var(--accent); border:none; border-radius:6px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="main">
            <div class="panel">
                <h1 id="r-name">APEXNITY</h1>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <div class="stat-card"><small>CTL (Fitness)</small><div id="v-ctl">0</div></div>
                    <div class="stat-card"><small>ATL (Fatigue)</small><div id="v-atl">0</div></div>
                    <div class="stat-card"><small>TSB (Form)</small><div id="v-tsb">0</div></div>
                </div>
            </div>
            <div class="panel" style="margin-top:20px;">
                <canvas id="chart" height="300"></canvas>
            </div>
        </div>
        <div class="side">
            <div class="panel">
                <h3>Race Strategy</h3>
                <input type="text" id="in-name" placeholder="Race Name">
                <input type="number" id="in-km" placeholder="Target KM">
                <input type="date" id="in-date">
                <button class="btn-save" onclick="save()">SAVE STRATEGY</button>
            </div>
            <a href="https://www.strava.com/oauth/authorize?client_id=173527&response_type=code&redirect_uri=https://apexsync.vercel.app/api&scope=activity:read_all" class="btn-strava">SYNC STRAVA</a>
        </div>
    </div>
    <script>
        let uId;
        async function load() {
            const res = await fetch('/api/metrics');
            const data = await res.json();
            if(data && data.length > 0) {
                const last = data[0];
                uId = last.user_id;
                document.getElementById('r-name').innerText = last.race_name || "DASHBOARD READY";
                document.getElementById('v-ctl').innerText = Math.round(last.ctl);
                document.getElementById('v-atl').innerText = Math.round(last.atl);
                document.getElementById('v-tsb').innerText = Math.round(last.tsb);
                renderChart(data.reverse());
            }
        }
        async function save() {
            if(!uId) { alert("Please Sync Strava first!"); return; }
            const payload = {
                user_id: uId, race_name: document.getElementById('in-name').value,
                target_km: document.getElementById('in-km').value, race_date: document.getElementById('in-date').value
            };
            await fetch('/api/save-strategy', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            location.reload();
        }
        function renderChart(data) {
            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: { labels: data.map(d => new Date(d.record_date).toLocaleDateString()), 
                datasets: [{ label: 'Fitness (CTL)', data: data.map(d => d.ctl), borderColor: '#00f2ff', tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        load();
    </script>
</body>
</html>
