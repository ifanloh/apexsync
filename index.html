<div class="panel" style="margin-top:25px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Weekly Training Plan</h3>
        <button onclick="generatePlan()" style="padding:5px 10px; font-size:11px; cursor:pointer;">Regenerate Plan</button>
    </div>
    <div id="plan-container" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:10px; margin-top:10px;">
        </div>
</div>

<script>
    async function getPlan() {
        const res = await fetch(`/api/get-plan?user_id=${userId}`);
        const data = await res.json();
        if(data.plan_json) renderPlan(data.plan_json);
    }

    function renderPlan(plan) {
        const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        document.getElementById('plan-container').innerHTML = days.map(day => `
            <div style="background:#0d1117; padding:10px; border-radius:8px; border:1px solid #30363d; text-align:center;">
                <div style="font-size:10px; color:#8b949e; text-transform:uppercase;">${day}</div>
                <div style="font-size:12px; font-weight:bold; margin-top:5px; color:var(--accent);">${plan[day]}</div>
            </div>
        `).join('');
    }

    async function generatePlan() {
        const res = await fetch('/api/generate-plan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                user_id: userId, 
                target_km: document.getElementById('in-km').value,
                target_type: "Trail" 
            })
        });
        const data = await res.json();
        renderPlan(data.plan);
    }

    // Panggil getPlan() di dalam function loadCommander()
</script>
