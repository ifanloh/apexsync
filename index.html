<div class="input-box">
    <label>GPX Course File</label>
    <div style="display: flex; gap: 10px; margin-top: 6px;">
        <input type="file" id="in-gpx-file" accept=".gpx" style="display:none" onchange="handleFile(this)">
        <button type="button" onclick="document.getElementById('in-gpx-file').click()" 
                style="background: #21262d; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; flex: 1;">
            Choose .GPX File
        </button>
    </div>
    <div id="file-status" style="font-size: 11px; color: var(--accent); margin-top: 5px;"></div>
    <textarea id="in-gpx-content" style="display:none"></textarea> 
</div>

<script>
    let gpxString = "";

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                gpxString = e.target.result;
                document.getElementById('file-status').innerText = `✅ Loaded: ${file.name}`;
                
                // Opsional: Coba ekstrak elevasi otomatis dari GPX
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(gpxString, "text/xml");
                const eleNodes = xmlDoc.getElementsByTagName("ele");
                if(eleNodes.length > 0) {
                    console.log("Elevation data found in GPX");
                }
            };
            reader.readAsText(file);
        }
    }

    async function saveStrategy() {
        // Ambil data dari form
        const payload = {
            user_id: userId,
            race_name: document.getElementById('in-race-name').value,
            target_km: document.getElementById('in-km').value,
            total_ascent: document.getElementById('in-elev').value,
            target_finish: document.getElementById('in-finish').value,
            race_date: document.getElementById('in-date').value,
            gpx_content: gpxString, // Hasil bacaan file tadi
            target_type: "Trail"
        };

        const res = await fetch('/api/save-strategy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert("Race Strategy & GPX Map Locked!");
            location.reload();
        }
    }
</script>
