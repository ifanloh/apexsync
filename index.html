<div class="target-box">
    <div style="display: flex; justify-content: space-between; font-size: 14px; align-items: center;">
        <span>Target Race: <b id="display-target">100</b>K</span>
        <button onclick="changeTarget()" style="background:none; border:1px solid #444; color:#aaa; font-size:10px; cursor:pointer; border-radius:4px; padding:2px 5px;">EDIT</button>
        <span id="target-percent">0%</span>
    </div>
    <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
</div>

<script>
    let currentUserId = ""; // Akan diisi saat data load

    async function loadApexnity() {
        const res = await fetch('/api/metrics');
        const data = await res.json();
        
        if(data && data.length > 0) {
            const latest = data[0];
            currentUserId = latest.user_id;
            const targetKm = latest.target_km || 100;
            
            document.getElementById('display-target').innerText = targetKm;
            document.getElementById('ctl-val').innerText = Math.round(latest.ctl);
            document.getElementById('atl-val').innerText = Math.round(latest.atl);
            document.getElementById('tsb-val').innerText = Math.round(latest.tsb);
            
            // Hitung Progress berdasarkan target dari DB
            const totalDist = data.reduce((s, a) => s + (parseFloat(a.distance) || 0), 0) / 1000;
            const percent = Math.min(Math.round((totalDist / targetKm) * 100), 100);
            
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('target-percent').innerText = percent + '%';
            
            renderPMC(data.reverse());
            renderActivities(data.slice(0, 5));
        }
    }

    async function changeTarget() {
        const newTarget = prompt("Masukkan target kilometer race kamu:", "116");
        if (newTarget && currentUserId) {
            const res = await fetch('/api/set-target', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId, target_km: parseFloat(newTarget) })
            });
            if(res.ok) location.reload();
        }
    }
    // ... rest of chart functions ...
</script>
