<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apexnity | Athlete Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --border: #30363d; --text: #c9d1d9;
            --cyan: #00f2ff; --orange: #fc4c02; --sidebar-w: 260px; --sidebar-c: 60px;
        }
        
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; transition: all 0.3s ease;
        }

        /* Sidebar Styling */
        #sidebar {
            width: var(--sidebar-w); height: 100vh; background: var(--card);
            border-right: 1px solid var(--border); position: fixed; left: 0; top: 0;
            display: flex; flex-direction: column; transition: width 0.3s ease;
            z-index: 1000; overflow: hidden;
        }

        #sidebar.collapsed { width: var(--sidebar-c); }

        .sidebar-header {
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
        }

        .profile-box {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; white-space: nowrap;
        }

        .profile-img {
            width: 32px; height: 32px; border-radius: 50%; background: var(--cyan);
            display: flex; align-items: center; justify-content: center; color: black; font-weight: bold;
        }

        .nav-links { padding: 10px; flex-grow: 1; }
        
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 10px;
            color: var(--text); text-decoration: none; border-radius: 6px;
            transition: 0.2s; margin-bottom: 5px; white-space: nowrap;
        }

        .nav-item:hover { background: #21262d; color: var(--cyan); }
        .nav-item.active { background: #21262d; color: var(--cyan); border-left: 3px solid var(--cyan); }

        .btn-sync {
            background: var(--orange); color: white; margin: 20px 10px;
            padding: 12px; border-radius: 6px; text-decoration: none;
            display: flex; align-items: center; gap: 10px; font-weight: bold;
        }

        /* Main Content Adjustments */
        #main-content {
            margin-left: var(--sidebar-w); padding: 25px; width: 100%;
            transition: margin-left 0.3s ease;
        }
        body.collapsed-mode #main-content { margin-left: var(--sidebar-c); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1200px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .span-2 { grid-column: span 2; }
        
        #toggle-sidebar {
            background: none; border: none; color: var(--text); cursor: pointer; padding: 5px;
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header">
        <span id="logo-text" style="font-weight: 800; color: white;">APEXNITY</span>
        <button id="toggle-sidebar"><i data-lucide="menu"></i></button>
    </div>

    <div class="profile-box">
        <div class="profile-img">M</div>
        <div class="profile-info">
            <div style="font-weight: bold; color: white;">M. Ma'mun Hariri</div>
            <small style="color: #8b949e;">Creative Designer</small>
        </div>
    </div>

    <div class="nav-links">
        <a href="#" class="nav-item active"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
        <a href="#" class="nav-item"><i data-lucide="map"></i> <span>Race Strategy</span></a>
        <a href="#" class="nav-item"><i data-lucide="settings"></i> <span>Settings</span></a>
    </div>

    <a href="https://www.strava.com/oauth/authorize?client_id=173527&response_type=code&redirect_uri=https://apexsync.vercel.app/api/metrics&scope=activity:read_all" class="btn-sync">
        <i data-lucide="refresh-cw"></i> <span>SYNC STRAVA</span>
    </a>
</nav>

<main id="main-content">
