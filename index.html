<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Apexnity | Trail Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00f2ff; --empty: #21262d; --level1: #0e4429; --level2: #006d32; --level3: #26a641; --level4: #39d353; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        .brand { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .chart-box, .heatmap-box { background: var(--card); padding: 25px; border-radius: 12px; margin-top: 30px; border: 1px solid #30363d; }
        .heatmap-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 15px; }
        .day { width: 12px; height: 12px; border-radius: 2px; background: var(--empty); cursor: pointer; }
        .btn-sync { background: #fc4c02; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">APEXNITY</div>
        <a href="https://www.strava.com/oauth/authorize?client_id=GANTI_ID_STRAVA&response_type=code&redirect_uri=https://apexsync.vercel.app/api&scope=activity:read_all" class="btn-sync">SYNC DATA</a>
    </div>

    <div class="grid">
        <div class="card"><h3>Fitness (CTL)</h3><div class="value" id="ctl-val">0</div></div>
        <div class="card"><h3>Fatigue (ATL)</h3><div class="value" id="atl-val" style="color: #ff4500;">0</div></div>
        <div class="card"><h3>Form (TSB)</h3><div class="value" id="tsb-val" style="color: #00ff88;">0</div></div>
    </div>

    <div class="chart-box"><canvas id="pmcChart" height="300"></canvas></div>

    <div class="heatmap-box">
        <h3 style="margin-top:0; font-size:14px; color:#8b949e;">TRAINING CONSISTENCY (Last Year)</h3>
        <div id="heatmap" class="heatmap-grid"></div>
    </div>

    <script>
        async function loadAll() {
            // Metrics Data
            const resM = await fetch('/api/metrics');
            const dataM = await resM.json();
            if(dataM.length > 0) {
                document.getElementById('ctl-val').innerText = Math.round(dataM[0].ctl);
                document.getElementById('atl-val').innerText = Math.round(dataM[0].atl);
                document.getElementById('tsb-val').innerText = Math.round(dataM[0].tsb);
                renderPMC(dataM.reverse());
            }

            // Heatmap Data
            const resH = await fetch('/api/heatmap');
            const dataH = await resH.json();
            renderHeatmap(dataH);
        }

        function renderHeatmap(data) {
            const container = document.getElementById('heatmap');
            const dates = data.reduce((acc, d) => ({...acc, [new Date(d.day).toISOString().split('T')[0]]: d.total_km}), {});
            
            for(let i=364; i>=0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const km = dates[dateStr] || 0;
                
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.title = `${dateStr}: ${km.toFixed(1)} km`;
                if(km > 0 && km < 10) dayEl.style.background = 'var(--level1)';
                else if(km >= 10 && km < 25) dayEl.style.background = 'var(--level2)';
                else if(km >= 25 && km < 50) dayEl.style.background = 'var(--level3)';
                else if(km >= 50) dayEl.style.background = 'var(--level4)';
                
                container.appendChild(dayEl);
            }
        }

        function renderPMC(data) {
            new Chart(document.getElementById('pmcChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => new Date(d.record_date).toLocaleDateString()),
                    datasets: [
                        { label: 'CTL (Fitness)', data: data.map(d => d.ctl), borderColor: '#00f2ff', tension: 0.3, fill: false },
                        { label: 'Form (TSB)', data: data.map(d => d.tsb), backgroundColor: 'rgba(0, 255, 136, 0.2)', fill: true, type: 'bar' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        loadAll();
    </script>
</body>
</html>
