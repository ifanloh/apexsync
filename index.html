<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Apexnity | Race Commander</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00f2ff; --border: #30363d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #race-map { height: 400px; border-radius: 8px; background: #0d1117; }
        input, textarea, select { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        .btn { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .sidebar-sync { display: block; text-align: center; background: #fc4c02; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .sidebar-sync:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main">
        <div class="panel">
            <h1 id="disp-race-name" style="margin:0; color:white;">APEXNITY COMMANDER</h1>
            <div id="disp-timer" style="font-family:monospace; font-size:24px; color:var(--accent);">00D 00H 00M 00S</div>
            
            <div class="stat-grid">
                <div class="stat-card"><small>CTL</small><div id="v-ctl" style="font-weight:bold; color:white;">0</div></div>
                <div class="stat-card"><small>ATL</small><div id="v-atl" style="font-weight:bold; color:white;">0</div></div>
                <div class="stat-card"><small>TSB</small><div id="v-tsb" style="font-weight:bold; color:white;">0</div></div>
                <div class="stat-card"><small>PROGRESS</small><div id="v-prog" style="font-weight:bold; color:var(--accent);">0%</div></div>
            </div>
        </div>

        <div class="panel">
            <h3>Race Course Map</h3>
            <div id="race-map"></div>
        </div>

        <div class="panel">
            <h3>Performance Management Chart</h3>
            <div style="height: 250px;"><canvas id="pmcChart"></canvas></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h3 style="color:var(--accent); margin-top:0;">Race Strategy</h3>
            <div style="margin-bottom:10px;">
                <label style="font-size:11px;">Race Name</label>
                <input type="text" id="in-name" placeholder="e.g. Rinjani 100">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div style="flex:1;">
                    <label style="font-size:11px;">Dist (KM)</label>
                    <input type="number" id="in-km" placeholder="116">
                </div>
                <div style="flex:1;">
                    <label style="font-size:11px;">Ascent (M)</label>
                    <input type="number" id="in-elev" placeholder="5000">
                </div>
            </div>
            <div style="margin-bottom:10px;">
                <label style="font-size:11px;">Race Date</label>
                <input type="date" id="in-date">
            </div>
            <div style="margin-bottom:10px;">
                <label style="font-size:11px;">Target Finish</label>
                <input type="text" id="in-finish" placeholder="HH:MM:SS">
            </div>
            <div style="margin-bottom:15px;">
                <label style="font-size:11px;">Upload GPX</label>
                <input type="file" id="in-file" accept=".gpx" onchange="readGPX(this)">
            </div>
            <button class="btn" onclick="save()">LOCK STRATEGY</button>
        </div>
        
        <a href="https://www.strava.com/oauth/authorize?client_id=173527&response_type=code&redirect_uri=https://apexsync.vercel.app/api&scope=activity:read_all" 
           class="sidebar-sync">SYNC WITH STRAVA</a>
    </div>
</div>

<script>
    let userId, map, gpxContent;

    async function load() {
        try {
            const res = await fetch('/api/metrics');
            const data = await res.json();
            if(data && data.length > 0) {
                const last = data[0];
                userId = last.user_id;
                document.getElementById('disp-race-name').innerText = last.race_name || "PLAN YOUR RACE";
                document.getElementById('v-ctl').innerText = Math.round(last.ctl || 0);
                document.getElementById('v-atl').innerText = Math.round(last.atl || 0);
                document.getElementById('v-tsb').innerText = Math.round(last.tsb || 0);
                
                if(last.race_date) startTimer(last.race_date);
                if(last.gpx_data) drawMap(last.gpx_data);
                renderChart(data.reverse());
            }
        } catch(e) { console.error("Load error:", e); }
    }

    function readGPX(input) {
        const reader = new FileReader();
        reader.onload = (e) => gpxContent = e.target.result;
        reader.readAsText(input.files[0]);
    }

    async function save() {
        const payload = {
            user_id: userId, 
            race_name: document.getElementById('in-name').value,
            target_km: document.getElementById('in-km').value, 
            total_ascent: document.getElementById('in-elev').value,
            race_date: document.getElementById('in-date').value, 
            target_finish: document.getElementById('in-finish').value,
            gpx_content: gpxContent, 
            target_type: "Trail"
        };
        const res = await fetch('/api/save-strategy', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload) 
        });
        if(res.ok) {
            alert("Strategy Synchronized!");
            location.reload();
        }
    }

    function drawMap(gpx) {
        if(map) map.remove();
        map = L.map('race-map').setView([0,0], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        try {
            new L.GPX(gpx, { 
                async: true, 
                polyline_options: {color: '#00f2ff', weight: 4} 
            }).on('loaded', e => map.fitBounds(e.target.getBounds())).addTo(map);
        } catch(e) { console.error("GPX Draw error:", e); }
    }

    function startTimer(date) {
        setInterval(() => {
            const diff = new Date(date) - new Date();
            if(diff < 0) return;
            const d = Math.floor(diff / 864e5), 
                  h = Math.floor((diff % 864e5) / 36e5), 
                  m = Math.floor((diff % 36e5) / 6e4), 
                  s = Math.floor((diff % 6e4) / 1000);
            document.getElementById('disp-timer').innerText = `${d}D ${h}H ${m}M ${s}S`;
        }, 1000);
    }

    function renderChart(data) {
        const ctx = document.getElementById('pmcChart');
        new Chart(ctx, {
            type: 'line',
            data: { 
                labels: data.map(d => new Date(d.record_date).toLocaleDateString()), 
                datasets: [{ 
                    label: 'CTL (Fitness)', 
                    data: data.map(d => d.ctl), 
                    borderColor: '#00f2ff',
                    tension: 0.3
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { grid: { color: '#30363d' } }, x: { grid: { display: false } } }
            }
        });
    }

    load();
</script>
</body>
</html>
