<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Apexnity | 116K Commander</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00f2ff; --border: #30363d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .stat-card { background: #0d1117; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-card div { font-size: 26px; font-weight: bold; color: white; margin-top: 5px; }
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); color: white; margin-top: 10px; border-radius: 6px; box-sizing: border-box; }
        .btn-strava { display: block; text-align: center; background: #fc4c02; color: white; text-decoration: none; padding: 14px; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        .btn-save { width: 100%; margin-top: 15px; padding: 14px; background: var(--accent); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="main">
            <div class="panel">
                <h1 id="r-name" style="margin:0;">APEXNITY ACTIVE</h1>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px;">
                    <div class="stat-card"><small>CTL (Fitness)</small><div id="v-ctl">0</div></div>
                    <div class="stat-card"><small>ATL (Fatigue)</small><div id="v-atl">0</div></div>
                    <div class="stat-card"><small>TSB (Form)</small><div id="v-tsb">0</div></div>
                </div>
            </div>
            <div class="panel">
                <h3 style="margin-top:0">Training Trend (Last 100 Runs)</h3>
                <div style="height:350px;"><canvas id="chart"></canvas></div>
            </div>
        </div>
        <div class="side">
            <div class="panel">
                <h3 style="margin-top:0">Race Strategy</h3>
                <input type="text" id="in-name" placeholder="Race Name">
                <input type="number" id="in-km" placeholder="Target KM">
                <input type="date" id="in-date">
                <button class="btn-save" onclick="save()">LOCK STRATEGY</button>
            </div>
            <a href="https://www.strava.com/oauth/authorize?client_id=173527&response_type=code&redirect_uri=https://apexsync.vercel.app/api&scope=activity:read_all" class="btn-strava">SYNC WITH STRAVA</a>
        </div>
    </div>

    <script>
        let uId;
        async function load() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();
                
                if(data && data.length > 0) {
                    const last = data[0];
                    uId = last.user_id;
                    document.getElementById('v-ctl').innerText = Math.round(last.ctl);
                    document.getElementById('v-atl').innerText = Math.round(last.atl);
                    document.getElementById('v-tsb').innerText = Math.round(last.tsb);
                    renderChart(data.reverse());
                } else {
                    console.log("Menunggu data dari database...");
                }
            } catch (e) { console.error("Error loading data:", e); }
        }

        async function save() {
            if(!uId) { alert("Klik Sync Strava dulu biar dapet User ID!"); return; }
            const payload = {
                user_id: uId, race_name: document.getElementById('in-name').value,
                target_km: document.getElementById('in-km').value, race_date: document.getElementById('in-date').value
            };
            await fetch('/api/save-strategy', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            location.reload();
        }

        function renderChart(data) {
            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: { 
                    labels: data.map(d => new Date(d.record_date).toLocaleDateString()), 
                    datasets: [{ 
                        label: 'Fitness (CTL)', 
                        data: data.map(d => d.ctl), 
                        borderColor: '#00f2ff', 
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        fill: true,
                        tension: 0.3 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        load();
    </script>
</body>
</html>
